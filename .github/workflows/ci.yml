name: Open-source RTL CI

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rtl-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rtl:
    name: Open-source verification gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Cache OSS CAD Suite
        id: oss-cad-cache
        uses: actions/cache@v4
        with:
          path: .tools/oss-cad-suite
          key: oss-cad-suite-linux-x64-${{ hashFiles('scripts/setup_tools.sh') }}

      - name: Install OSS CAD Suite
        if: steps.oss-cad-cache.outputs.cache-hit != 'true'
        shell: bash
        run: make oss-cad-setup

      - name: Show tool versions
        shell: bash
        run: make tools-versions

      - name: Install verification dependencies
        shell: bash
        run: make verification-setup

      - name: Run complete RTL gate
        shell: bash
        run: make ci

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rtl-ci-logs
          path: |
            build/coverage/
            build/cocotb/
            build/synth/yosys/
            build/formal/
            .tools/riscv-formal/cores/rv32i-pipeline/checks/*/status
            .tools/riscv-formal/cores/rv32i-pipeline/checks/*/logfile.txt
            .tools/riscv-formal/cores/rv32i-pipeline/checks/*/engine_0/trace.vcd
          if-no-files-found: ignore
          include-hidden-files: true
