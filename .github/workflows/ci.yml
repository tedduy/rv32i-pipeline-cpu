name: Open-source RTL CI

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: rtl-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci_image:
    name: CI image
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/docker-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      dockerfile: ./Dockerfile.ci
      tag-prefix: ci-
    secrets: inherit

  image:
    name: Select image
    needs: ci_image
    if: always()
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Select image
        id: image
        shell: bash
        env:
          BUILT_IMAGE: ${{ needs.ci_image.outputs.image-primary-tag }}
          FALLBACK_IMAGE: ghcr.io/${{ github.repository }}:ci-main
        run: |
          if [[ "${{ needs.ci_image.result }}" == "success" && -n "$BUILT_IMAGE" ]]; then
            echo "tag=$BUILT_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(printf '%s' "$FALLBACK_IMAGE" | tr '[:upper:]' '[:lower:]')" \
              >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: ${{ needs.image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Repository consistency
        run: make consistency
      - name: Verilator lint
        run: make lint
      - name: Upload static-check logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: static-check-logs
          path: rtl/lint/reports/
          if-no-files-found: ignore

  test:
    name: Simulation
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    container:
      image: ${{ needs.image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Cocotb with Verilator
        run: make cocotb-verilator
      - name: Cocotb with Icarus
        run: make cocotb-iverilog
      - name: Upload simulator logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: simulator-logs
          path: build/cocotb/
          if-no-files-found: ignore

  formal:
    name: Formal
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    container:
      image: ${{ needs.image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Protocol formal
        run: make formal
      - name: RISC-V formal
        run: make riscv-formal
      - name: Upload formal logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: formal-logs
          path: |
            build/formal/
            /opt/rv32i-tools/riscv-formal/cores/rv32i-pipeline/checks/*/status
            /opt/rv32i-tools/riscv-formal/cores/rv32i-pipeline/checks/*/logfile.txt
            /opt/rv32i-tools/riscv-formal/cores/rv32i-pipeline/checks/*/engine_0/trace.vcd
          if-no-files-found: ignore
          include-hidden-files: true

  result:
    name: Result
    if: always()
    needs:
      - ci_image
      - image
      - lint
      - test
      - formal
    runs-on: ubuntu-24.04
    steps:
      - name: Check all required jobs
        shell: bash
        env:
          IMAGE_BUILD_RESULT: ${{ needs.ci_image.result }}
          IMAGE_SELECT_RESULT: ${{ needs.image.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          FORMAL_RESULT: ${{ needs.formal.result }}
        run: |
          [[ "$IMAGE_BUILD_RESULT" == "success" || "$IMAGE_BUILD_RESULT" == "skipped" ]]
          [[ "$IMAGE_SELECT_RESULT" == "success" ]]
          [[ "$LINT_RESULT" == "success" ]]
          [[ "$TEST_RESULT" == "success" ]]
          [[ "$FORMAL_RESULT" == "success" ]]
