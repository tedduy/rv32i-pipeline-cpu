name: ci

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: tdrv32-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci_image:
    name: image
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/docker-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      dockerfile: ./Dockerfile.ci
      tag-prefix: ci-
    secrets: inherit

  image:
    name: setup
    needs: ci_image
    if: always()
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: image
        id: image
        shell: bash
        env:
          BUILT_IMAGE: ${{ needs.ci_image.outputs.image-primary-tag }}
          FALLBACK_IMAGE: ghcr.io/${{ github.repository }}:ci-main
        run: |
          if [[ "${{ needs.ci_image.result }}" == "success" && -n "$BUILT_IMAGE" ]]; then
            echo "tag=$BUILT_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(printf '%s' "$FALLBACK_IMAGE" | tr '[:upper:]' '[:lower:]')" \
              >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: lint
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: ${{ needs.image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: consistency
        run: make consistency
      - name: verilator
        run: make lint
      - name: logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: static-check-logs
          path: rtl/lint/reports/
          if-no-files-found: ignore

  test:
    name: simulation
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    container:
      image: ${{ needs.image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: verilator
        run: make cocotb-verilator
      - name: icarus
        run: make cocotb-iverilog
      - name: logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: simulator-logs
          path: build/cocotb/
          if-no-files-found: ignore

  formal:
    name: formal
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    container:
      image: ${{ needs.image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: protocol
        run: make formal
      - name: isa
        run: make riscv-formal
      - name: logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: formal-logs
          path: |
            build/formal/
            /opt/tdrv32-tools/riscv-formal/cores/tdrv32/checks/*/status
            /opt/tdrv32-tools/riscv-formal/cores/tdrv32/checks/*/logfile.txt
            /opt/tdrv32-tools/riscv-formal/cores/tdrv32/checks/*/engine_0/trace.vcd
          if-no-files-found: ignore
          include-hidden-files: true

  result:
    name: result
    if: always()
    needs:
      - ci_image
      - image
      - lint
      - test
      - formal
    runs-on: ubuntu-24.04
    steps:
      - name: verify
        shell: bash
        env:
          IMAGE_BUILD_RESULT: ${{ needs.ci_image.result }}
          IMAGE_SELECT_RESULT: ${{ needs.image.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          FORMAL_RESULT: ${{ needs.formal.result }}
        run: |
          [[ "$IMAGE_BUILD_RESULT" == "success" || "$IMAGE_BUILD_RESULT" == "skipped" ]]
          [[ "$IMAGE_SELECT_RESULT" == "success" ]]
          [[ "$LINT_RESULT" == "success" ]]
          [[ "$TEST_RESULT" == "success" ]]
          [[ "$FORMAL_RESULT" == "success" ]]
