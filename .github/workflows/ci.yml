name: Open-source RTL CI

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: rtl-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_ci_image:
    name: Build CI image
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/docker-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      dockerfile: ./Dockerfile.ci
      tag-prefix: ci-
    secrets: inherit

  select_ci_image:
    name: Select CI image
    needs: build_ci_image
    if: always()
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Select image
        id: image
        shell: bash
        env:
          BUILT_IMAGE: ${{ needs.build_ci_image.outputs.image-primary-tag }}
          FALLBACK_IMAGE: ghcr.io/${{ github.repository }}:ci-main
        run: |
          if [[ "${{ needs.build_ci_image.result }}" == "success" && -n "$BUILT_IMAGE" ]]; then
            echo "tag=$BUILT_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(printf '%s' "$FALLBACK_IMAGE" | tr '[:upper:]' '[:lower:]')" \
              >> "$GITHUB_OUTPUT"
          fi

  static_checks:
    name: Static checks
    needs: select_ci_image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: ${{ needs.select_ci_image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Repository consistency
        run: make consistency
      - name: Verilator lint
        run: make lint
      - name: Upload static-check logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: static-check-logs
          path: rtl/lint/reports/
          if-no-files-found: ignore

  simulation:
    name: Simulator regression
    needs: select_ci_image
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    container:
      image: ${{ needs.select_ci_image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Cocotb with Verilator
        run: make cocotb-verilator
      - name: Cocotb with Icarus
        run: make cocotb-iverilog
      - name: Upload simulator logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: simulator-logs
          path: build/cocotb/
          if-no-files-found: ignore

  dynamic_verification:
    name: Random and coverage
    needs: select_ci_image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ${{ needs.select_ci_image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Constrained-random regression
        run: make random-regression
      - name: Code and functional coverage
        run: make coverage
      - name: Upload verification results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verification-results
          path: |
            build/cocotb/
            build/coverage/
          if-no-files-found: ignore

  formal:
    name: Formal verification
    needs: select_ci_image
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    container:
      image: ${{ needs.select_ci_image.outputs.image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Protocol formal
        run: make formal
      - name: RISC-V formal
        run: make riscv-formal
      - name: Upload formal logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: formal-logs
          path: |
            build/formal/
            /opt/rv32i-tools/riscv-formal/cores/rv32i-pipeline/checks/*/status
            /opt/rv32i-tools/riscv-formal/cores/rv32i-pipeline/checks/*/logfile.txt
            /opt/rv32i-tools/riscv-formal/cores/rv32i-pipeline/checks/*/engine_0/trace.vcd
          if-no-files-found: ignore
          include-hidden-files: true

  rtl_gate:
    name: Open-source verification gate
    if: always()
    needs:
      - build_ci_image
      - select_ci_image
      - static_checks
      - simulation
      - dynamic_verification
      - formal
    runs-on: ubuntu-24.04
    steps:
      - name: Check all required jobs
        shell: bash
        env:
          IMAGE_BUILD_RESULT: ${{ needs.build_ci_image.result }}
          IMAGE_SELECT_RESULT: ${{ needs.select_ci_image.result }}
          STATIC_RESULT: ${{ needs.static_checks.result }}
          SIMULATION_RESULT: ${{ needs.simulation.result }}
          DYNAMIC_RESULT: ${{ needs.dynamic_verification.result }}
          FORMAL_RESULT: ${{ needs.formal.result }}
        run: |
          [[ "$IMAGE_BUILD_RESULT" == "success" || "$IMAGE_BUILD_RESULT" == "skipped" ]]
          [[ "$IMAGE_SELECT_RESULT" == "success" ]]
          [[ "$STATIC_RESULT" == "success" ]]
          [[ "$SIMULATION_RESULT" == "success" ]]
          [[ "$DYNAMIC_RESULT" == "success" ]]
          [[ "$FORMAL_RESULT" == "success" ]]
