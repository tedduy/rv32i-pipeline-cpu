name: Open-source RTL CI

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rtl-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OSS_CAD_SUITE_DATE: "20260508"

jobs:
  rtl:
    name: Open-source verification gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Cache OSS CAD Suite
        id: oss-cad-cache
        uses: actions/cache@v4
        with:
          path: .tools/oss-cad-suite
          key: oss-cad-suite-linux-x64-${{ env.OSS_CAD_SUITE_DATE }}

      - name: Install OSS CAD Suite
        if: steps.oss-cad-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p .tools
          curl -L --fail --retry 3 \
            -o /tmp/oss-cad-suite.tgz \
            "https://github.com/YosysHQ/oss-cad-suite-build/releases/download/${OSS_CAD_SUITE_DATE:0:4}-${OSS_CAD_SUITE_DATE:4:2}-${OSS_CAD_SUITE_DATE:6:2}/oss-cad-suite-linux-x64-${OSS_CAD_SUITE_DATE}.tgz"
          tar -xzf /tmp/oss-cad-suite.tgz -C .tools

      - name: Show tool versions
        shell: bash
        run: |
          source .tools/oss-cad-suite/environment
          iverilog -V | head -n 2
          verilator --version
          yosys -V
          sby --version

      - name: Install verification dependencies
        shell: bash
        run: make verification-setup

      - name: Run complete RTL gate
        shell: bash
        run: |
          source .tools/oss-cad-suite/environment
          make ci

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rtl-ci-logs
          path: |
            build/coverage/
            build/cocotb/
            build/synth/yosys/
            verification/formal/rv32i_core_protocol_*/
          if-no-files-found: ignore
