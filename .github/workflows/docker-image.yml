name: image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile.ci
      - Makefile
      - mk/common.mk
      - mk/tools.mk
      - mk/simulation.mk
      - mk/formal.mk
      - scripts/setup_tools.sh
      - verification/requirements.txt
      - .github/workflows/docker-image.yml
  workflow_dispatch:
  workflow_call:
    inputs:
      image-name:
        description: Fully qualified GHCR image name
        required: false
        default: ""
        type: string
      dockerfile:
        description: Dockerfile used to build the image
        required: false
        default: ./Dockerfile.ci
        type: string
      tag-prefix:
        description: Prefix added to generated image tags
        required: false
        default: ci-
        type: string
    outputs:
      image-primary-tag:
        description: Primary image tag selected for this event
        value: ${{ jobs.build.outputs.image-primary-tag }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    outputs:
      image-primary-tag: ${{ steps.tags.outputs.primary }}

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: tags
        id: tags
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
          DEFAULT_IMAGE_NAME: ghcr.io/${{ github.repository }}
        shell: bash
        run: |
          image_name="${IMAGE_NAME:-$DEFAULT_IMAGE_NAME}"
          image_name="$(printf '%s' "$image_name" | tr '[:upper:]' '[:lower:]')"
          tag_prefix="${TAG_PREFIX:-ci-}"
          short_sha="${GITHUB_SHA::12}"

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            primary="${image_name}:${tag_prefix}pr-${{ github.event.pull_request.number }}"
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            primary="${image_name}:${tag_prefix}main"
          else
            ref_name="$(printf '%s' "$GITHUB_REF_NAME" | tr '/_' '--' | tr -cd '[:alnum:].-')"
            primary="${image_name}:${tag_prefix}${ref_name}"
          fi

          {
            echo "primary=$primary"
            echo "tags<<EOF"
            echo "$primary"
            echo "${image_name}:${tag_prefix}sha-${short_sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: buildx
        uses: docker/setup-buildx-action@v4

      - name: login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile || './Dockerfile.ci' }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
