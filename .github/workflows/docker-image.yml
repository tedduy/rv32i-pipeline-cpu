name: Build CI image

on:
  workflow_call:
    inputs:
      image-name:
        description: Fully qualified GHCR image name
        required: true
        type: string
      dockerfile:
        description: Dockerfile used to build the image
        required: true
        type: string
      tag-prefix:
        description: Prefix added to generated image tags
        required: false
        default: ci-
        type: string
    outputs:
      image-primary-tag:
        description: Primary image tag selected for this event
        value: ${{ jobs.build.outputs.image-primary-tag }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      image-primary-tag: ${{ steps.tags.outputs.primary }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Select image tags
        id: tags
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
        shell: bash
        run: |
          image_name="$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::12}"

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            primary="${image_name}:${TAG_PREFIX}pr-${{ github.event.pull_request.number }}"
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            primary="${image_name}:${TAG_PREFIX}main"
          else
            ref_name="$(printf '%s' "$GITHUB_REF_NAME" | tr '/_' '--' | tr -cd '[:alnum:].-')"
            primary="${image_name}:${TAG_PREFIX}${ref_name}"
          fi

          {
            echo "primary=$primary"
            echo "tags<<EOF"
            echo "$primary"
            echo "${image_name}:${TAG_PREFIX}sha-${short_sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
