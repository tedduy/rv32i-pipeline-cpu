[options]
isa rv32imc
nret 1
solver boolector

[depth]
insn 12
insn_(mul|mulh|mulhsu|mulhu|div|divu|rem|remu) 45
reg  1 12
pc_fwd 1 12
pc_bwd 1 12
ill 12

# Keep the default CI job bounded while sampling RV32I and RV32C behavior.
# Iterative M-extension proofs need a much deeper bound and remain part of
# `riscv-formal-all`.
# `make riscv-formal-all` removes this filter and generates every RV32IMC
# instruction check for exhaustive local runs.
[filter-checks]
+ insn_(add|addi|sub|srai|beq|jal|jalr|lw|sw|c_add|c_j|c_lw|c_sw)_ch0
+ (reg|pc_fwd|pc_bwd|ill)_ch0
- .*

[defines]
`define RISCV_FORMAL_ALIGNED_MEM

[verilog-files]
@basedir@/../../verification/riscv-formal/wrapper.sv
@basedir@/../../rtl/logical/common/adder_n_bit.sv
@basedir@/../../rtl/logical/common/mux2to1.sv
@basedir@/../../rtl/logical/common/mux3to1.sv
@basedir@/../../rtl/logical/common/mux4to1.sv
@basedir@/../../rtl/logical/stages/fetch/program_counter.sv
@basedir@/../../rtl/logical/stages/fetch/rv32c_fetch_buffer.sv
@basedir@/../../rtl/logical/stages/decode/control_unit.sv
@basedir@/../../rtl/logical/stages/decode/immediate_generator.sv
@basedir@/../../rtl/logical/stages/decode/register_file.sv
@basedir@/../../rtl/logical/stages/decode/rv32c_decompressor.sv
@basedir@/../../rtl/logical/stages/execute/alu_unit.sv
@basedir@/../../rtl/logical/stages/execute/iterative_multiplier.sv
@basedir@/../../rtl/logical/stages/execute/iterative_divider.sv
@basedir@/../../rtl/logical/stages/execute/mdu_unit.sv
@basedir@/../../rtl/logical/stages/execute/branch_unit.sv
@basedir@/../../rtl/logical/stages/execute/jump_unit.sv
@basedir@/../../rtl/logical/stages/memory/load_store_unit.sv
@basedir@/../../rtl/logical/stages/system/csr_file.sv
